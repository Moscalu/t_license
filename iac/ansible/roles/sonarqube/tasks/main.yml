# roles/sonarqube/tasks/main.yml
# ─────────────────────────────────────────────────────────────────────────────
# Deploy SonarQube using Docker Compose.
# Requires: docker role must run first.
#
# ⚠️  CRITICAL — Before running this role:
#   SonarQube bundles Elasticsearch which requires vm.max_map_count=262144
#   at the kernel level. For LXC containers this must be set on the
#   PROXMOX HOST (not inside the container). Run once on your Proxmox node:
#
#     echo "vm.max_map_count=262144" >> /etc/sysctl.conf && sysctl -p
#
#   Without this SonarQube will fail with:
#   "max virtual memory areas vm.max_map_count [65530] is too low"

