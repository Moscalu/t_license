# roles/traefik/tasks/main.yml
# ─────────────────────────────────────────────────────────────────────────────
# Deploy Traefik reverse proxy using Docker Compose.
# Requires: docker role must run first.
#
# Traefik is the entry point for all HTTPS traffic to *.homelab.local.
# It reads config from three locations (all mounted via docker-compose.yml):
#   - Static config:  /opt/traefik/config/traefik.yml  (entrypoints, providers)
#   - Dynamic config: /opt/traefik/config/dynamic/      (routing rules per service)
#   - TLS certs:      /opt/traefik/certs/               (wildcard.homelab.local)

