# roles/monitoring/tasks/main.yml
# ─────────────────────────────────────────────────────────────────────────────
# Deploy Prometheus + Grafana monitoring stack using Docker Compose.
# Requires: docker role must run first.
#
# Prometheus scrapes metrics from:
#   - GitLab CE built-in exporter  → gitlab.homelab.local/-/metrics
#   - GitLab Runners               → runner IPs on port 9252
#   - Node exporter (optional)     → all hosts on port 9100
#
# Grafana uses Prometheus as a data source and provides dashboards.
# Default Grafana credentials: admin / admin (change on first login).

---

