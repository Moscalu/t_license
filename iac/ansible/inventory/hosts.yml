# inventory/hosts.yml
# ─────────────────────────────────────────────────────────────────────────────
# This file tells Ansible which servers exist, how to group them, and how to
# reach each one. Ansible reads this before every playbook run.
#
# HOW IT WORKS:
#   - Each entry under "hosts:" is a server Ansible will SSH into
#   - "ansible_host" is the actual IP address used for the SSH connection
#   - Groups let you target a subset of servers in a playbook (e.g. "traefik")
#   - The special group "all" contains every host automatically
#
# RUN AGAINST A SINGLE GROUP:
#   ansible-playbook -i inventory/hosts.yml playbooks/02_gitlab.yml
#
# LIST ALL RESOLVED HOSTS:
#   ansible-inventory -i inventory/hosts.yml --list

all:
  children:

    traefik:
      hosts:
        traefik:
          ansible_host: 10.10.1.201   # ← replace with your Traefik container IP

    gitlab:
      hosts:
        gitlab:
          ansible_host: 10.10.1.202   # ← replace with your GitLab container IP

    sonarqube:
      hosts:
        sonarqube:
          ansible_host: 10.10.1.203   # ← replace with your SonarQube container IP

    monitoring:
      hosts:
        monitoring:
          ansible_host: 10.10.1.204   # ← replace with your Prometheus/Grafana container IP

    runners:
      hosts:
        runner-test:
          ansible_host: 10.10.1.205   # ← replace with your test runner IP
        runner-prod:
          ansible_host: 10.10.1.206   # ← replace with your prod runner IP
